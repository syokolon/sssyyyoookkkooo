    <img src="images/right1.png" id="walker">
<script>
const walker = document.getElementById("walker");

const frames = {
  right: ["images/right1.png","images/right2.png","images/right3.png"],
  left: ["images/left1.png","images/left2.png","images/left3.png"],
  front: ["images/front1.png","images/front2.png","images/front3.png"],
  back: ["images/back1.png","images/back2.png","images/back3.png"]
};

let x = 100;
let y = 100;

let speedX = 2;
let speedY = 1;

let i = 0;
let direction = "right";

let lastFrameTime = 0;
const frameDelay = 150;

// ランダム方向変更
function changeDirection() {
  const angle = Math.random() * Math.PI * 2;

  speedX = Math.cos(angle) * 2;
  speedY = Math.sin(angle) * 2;

  // 向き決定
  if (Math.abs(speedX) > Math.abs(speedY)) {
    direction = speedX > 0 ? "right" : "left";
  } else {
    direction = speedY > 0 ? "front" : "back";
  }
}

// 最初＆3秒ごとに方向変える
changeDirection();
setInterval(changeDirection, 3000);

function loop(time) {

  x += speedX;
  y += speedY;

  const maxX = window.innerWidth - walker.offsetWidth;
  const maxY = window.innerHeight - walker.offsetHeight;

  // 壁に当たったら跳ね返る
  if (x <= 0 || x >= maxX) {
    speedX *= -1;
  }
  if (y <= 0 || y >= maxY) {
    speedY *= -1;
  }

  walker.style.left = x + "px";
  walker.style.top = y + "px";

  // コマ送り
  if (time - lastFrameTime > frameDelay) {
    walker.src = frames[direction][i];
    i = (i + 1) % 3;
    lastFrameTime = time;
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
