<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スプラッシュ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">

<img src="images/logo1.png">
  <img src="images/logo2.png">

  <div class="version">ver 1.0.0</div>

</div>

<script>
  // 1枚目 → 2枚目 → 遷移
  setTimeout(() => {
    document.getElementById("image/logo1.png").classList.remove("active");
    document.getElementById("image/logo2.png").classList.add("active");
  }, 1000);

  setTimeout(() => {
    document.body.classList.add("fadeout");
  }, 2000);

  setTimeout(() => {
    window.location.href = "work.html";
  }, 2500);
</script>

</body>
</html>
