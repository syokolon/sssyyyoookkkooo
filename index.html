<body>

<div id="splash">
  <img src="images/logo1.png" class="logo active" id="logo1">
  <img src="images/logo2.png" class="logo" id="logo2">
  <img src="images/logo_final.png" class="logo" id="logo3">
</div>

<script>
  setTimeout(() => {
    logo1.classList.remove("active");
    logo2.classList.add("active");
  }, 800);

  setTimeout(() => {
    logo2.classList.remove("active");
    logo3.classList.add("active");
  }, 1400);

  setTimeout(() => {
    window.location.href = "work.html";
  }, 2200);
</script>

</body>
