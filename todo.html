<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぴよたそ風 ToDo</title>

<style>

body{
  margin:0;
  padding:0;
  background:#FFF8F2;
  font-family:sans-serif;
}

/* タイトル */
.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#555;
}

/* フォルダ一覧 */
#folderList{
  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:14px;

  padding:14px;

  padding-bottom:120px;
}

/* フォルダ */
.folder{
  aspect-ratio:1/1;

  border-radius:28px;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  font-size:20px;

  color:#444;

  box-shadow:0 4px 10px rgba(0,0,0,0.12);

  transition:0.15s;
}

.folder:active{
  transform:scale(0.95);
}

/* アイコン */
.icon{
  font-size:46px;
  margin-bottom:10px;
}

/* ＋ボタン */
#addFolderBtn{
  position:fixed;

  right:20px;
  bottom:25px;

  width:72px;
  height:72px;

  border:none;

  border-radius:50%;

  background:#FFD966;

  color:#444;

  font-size:42px;

  box-shadow:0 6px 14px rgba(0,0,0,0.2);

  z-index:100;
}

#addFolderBtn:active{
  transform:scale(0.92);
}

/* モーダル背景 */
#modal{
  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.3);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:200;
}

/* モーダル本体 */
.modalBox{
  width:80%;

  background:white;

  border-radius:28px;

  padding:25px;

  text-align:center;

  animation:pop 0.2s ease;
}

/* ポニョ */
@keyframes pop{
  0%{
    transform:scale(0.7);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }
}

.modalBox h2{
  margin-top:0;
  color:#555;
}

.modalBox input{
  width:90%;

  padding:14px;

  border:none;

  border-radius:16px;

  background:#F4F4F4;

  font-size:18px;

  outline:none;
}

/* ボタンエリア */
.modalButtons{
  margin-top:20px;

  display:flex;

  gap:10px;
}

/* モーダルボタン */
.modalButtons button{
  flex:1;

  padding:14px;

  border:none;

  border-radius:18px;

  font-size:18px;
}

#createBtn{
  background:#FFD966;
}

#cancelBtn{
  background:#EEE;
}

</style>
</head>

<body>

<div class="header">
  📁 My ToDo
</div>

<!-- フォルダ一覧 -->
<div id="folderList"></div>

<!-- ＋ボタン -->
<button id="addFolderBtn">＋</button>

<!-- モーダル -->
<div id="modal">

  <div class="modalBox">

    <h2>フォルダ作成</h2>

    <input
      type="text"
      id="folderInput"
      placeholder="フォルダ名を入力"
    >

    <div class="modalButtons">

      <button id="cancelBtn">
        キャンセル
      </button>

      <button id="createBtn">
        作成
      </button>

    </div>

  </div>

</div>

<script>

const folderList = document.getElementById("folderList");

const addFolderBtn = document.getElementById("addFolderBtn");

const modal = document.getElementById("modal");

const folderInput = document.getElementById("folderInput");

const createBtn = document.getElementById("createBtn");

const cancelBtn = document.getElementById("cancelBtn");

/* 色 */
const colors = [
  "#FFD966",
  "#A4C2F4",
  "#B6D7A8",
  "#F4CCCC",
  "#D9B3FF",
  "#F9CB9C",
  "#D0E0E3",
  "#EAD1DC"
];

let colorIndex = 0;

/* ＋押した */
addFolderBtn.addEventListener("click", () => {

  modal.style.display = "flex";

  folderInput.value = "";

  folderInput.focus();

});

/* キャンセル */
cancelBtn.addEventListener("click", () => {

  modal.style.display = "none";

});

/* 作成 */
createBtn.addEventListener("click", createFolder);

/* Enterでも作成 */
folderInput.addEventListener("keydown", (e) => {

  if(e.key === "Enter"){
    createFolder();
  }

});

function createFolder(){

  const folderName = folderInput.value.trim();

  if(folderName === "") return;

  const folder = document.createElement("div");

  folder.className = "folder";

  folder.style.background = colors[colorIndex];

  colorIndex++;

  if(colorIndex >= colors.length){
    colorIndex = 0;
  }

  folder.innerHTML = `
    <div class="icon">📁</div>
    <div>${folderName}</div>
  `;

  folderList.appendChild(folder);

  modal.style.display = "none";

}

</script>

</body>
</html>
