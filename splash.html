<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スプラッシュ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="splash">

  <img src="images/logo1.png" class="logo active" id="logo1">
  <img src="images/logo2.png" class="logo" id="logo2">
  

 <div class="version">ver 1.0.0</div>

</div>

<script>
  // 1→2
  setTimeout(() => {
    document.getElementById("logo1").classList.remove("active");
    document.getElementById("logo2").classList.add("active");
  }, 800);

  // 2→3（最後）
  setTimeout(() => {
    document.getElementById("logo2").classList.remove("active");
    document.getElementById("logo3").classList.add("active"); 
    
  }, 1400);

  // 遷移
  setTimeout(() => {
    document.body.classList.add("fadeout");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 500);

  }, 2200);
</script>


</body>
</html>
